<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAKUN — Blog & Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="main-nav">
    <a href="index.html" class="nav-logo"><img src="https://i.postimg.cc/6300cGYs/IMG-20260319-125902.png" alt="RAKUN Logo"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalog.html">Catalog</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="index.html#contacts">Contacts</a></li>
    </ul>
  </nav>

  <header class="mobile-header" id="mobile-header">
    <a href="index.html" class="nav-logo"><img src="https://i.postimg.cc/6300cGYs/IMG-20260319-125902.png" style="height:24px;"></a>
    <button class="mobile-hamburger" onclick="toggleMobileMenu()"><span class="line-1"></span><span class="line-2"></span></button>
  </header>

  <section class="blog-hero">
    <div class="blog-hero-inner">
      <div>
        <div class="breadcrumb">
          <a href="index.html">Home</a><span class="breadcrumb-sep">/</span><span>Blog</span>
        </div>
        <div class="blog-hero-label">Knowledge Hub</div>
        <h1>Technology<em>&amp; Science</em></h1>
        <p>Deep dives into laundry chemistry, sustainability initiatives, and the innovations behind RAKUN.</p>
      </div>
    </div>
  </section>

  <!-- TABS + SEARCH -->
  <div class="blog-tabs-row">
    <div class="blog-tabs">
      <button class="tab-btn active" onclick="filterArticles('all', this)">All Articles</button>
      <button class="tab-btn" onclick="filterArticles('tech', this)">Technology</button>
      <button class="tab-btn" onclick="filterArticles('eco', this)">Eco &amp; Safety</button>
      <button class="tab-btn" onclick="filterArticles('science', this)">Science</button>
    </div>
    <div class="blog-search">
      <input type="text" id="search-input" placeholder="Search articles…" oninput="searchArticles(this.value)">
      <button><span class="material-symbols-outlined">search</span></button>
    </div>
  </div>

  <!-- FEATURED ARTICLE (Заполняется из БД) -->
  <section class="featured-section" id="featured-post-container"></section>

  <!-- ARTICLES GRID (Заполняется из БД) -->
  <section class="articles-section">
    <div class="articles-section-header">
      <div>
        <h2 class="articles-section-title">Latest Articles</h2>
        <div class="section-divider"></div>
      </div>
      <span class="articles-count" id="results-count"><strong>...</strong> articles found</span>
    </div>

    <div class="articles-grid" id="articles-grid"></div>
  </section>

  <footer>
    <span class="footer-logo"><img src="https://i.postimg.cc/6300cGYs/IMG-20260319-125902.png" alt="RAKUN Logo"></span>
    <div class="footer-links">
      <a href="catalog.html">Catalog</a>
      <a href="blog.html">Blog</a>
      <a href="index.html#contacts">Contacts</a>
    </div>
    <span class="footer-copy">© 2025 RAKUN</span>
  </footer>

  <script>
    window.toggleMobileMenu = function () {
      var menu = document.getElementById('mobile-menu-overlay');
      var isOpen = menu.classList.contains('open');
      menu.classList.toggle('open');
      document.body.style.overflow = isOpen ? '' : 'hidden';
    };

    window.filterArticles = function (cat, btn) {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      if (btn) btn.classList.add('active');

      var cards = document.querySelectorAll('.article-card');
      var visible = 0;
      cards.forEach(function (card, i) {
        var cardCat = card.getAttribute('data-cat');
        var show = (cat === 'all' || cardCat === cat);
        card.style.display = show ? '' : 'none';
        if (show) {
          visible++;
          card.style.animationDelay = (visible * 0.05) + 's';
          card.style.animation = 'none';
          card.offsetHeight;
          card.style.animation = '';
        }
      });
      var countEl = document.getElementById('results-count');
      if(countEl) countEl.innerHTML = '<strong>' + visible + '</strong> article' + (visible !== 1 ? 's' : '') + ' found';
    };

    window.searchArticles = function (query) {
      var q = query.toLowerCase().trim();
      var cards = document.querySelectorAll('.article-card');
      var visible = 0;
      cards.forEach(function (card) {
        var text = card.textContent.toLowerCase();
        var show = !q || text.includes(q);
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      var countEl = document.getElementById('results-count');
      if(countEl) countEl.innerHTML = '<strong>' + visible + '</strong> article' + (visible !== 1 ? 's' : '') + ' found';
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      var allBtn = document.querySelector('.tab-btn');
      if(allBtn && q === '') allBtn.classList.add('active');
    };
  </script>

  <!-- ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ И СКРИПТОВ -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="main.js"></script>

</body>
</html>
