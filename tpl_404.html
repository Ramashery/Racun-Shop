<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found · RAKUN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .e404 { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;padding:40px 20px; }
    .e404-code { font-size:min(18vw,160px);font-weight:900;line-height:1;color:var(--color-accent,#00b4d8);font-family:'Montserrat',sans-serif;margin-bottom:0; }
    .e404-title { font-size:1.8rem;font-weight:700;margin:12px 0 8px; }
    .e404-desc  { color:#64748b;margin-bottom:32px;font-size:1rem; }
    .e404-links { display:flex;gap:12px;flex-wrap:wrap;justify-content:center; }
    .e404-link  { padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;transition:opacity .2s; }
    .e404-link:hover { opacity:.8; }
    .e404-link.primary   { background:var(--color-accent,#00b4d8);color:#fff; }
    .e404-link.secondary { background:transparent;border:1px solid #cbd5e1;color:#475569; }
  </style>
</head>
<body>
  <nav id="main-nav" style="position:static;background:var(--bg-dark,#0a0a0a);">
    <a href="/" class="nav-logo"><img src="https://i.postimg.cc/6300cGYs/IMG-20260319-125902.png" alt="RAKUN Logo"></a>
  </nav>
  <div class="e404">
    <div class="e404-code">404</div>
    <h1 class="e404-title">Page Not Found</h1>
    <p class="e404-desc">The page you're looking for doesn't exist or has been moved.</p>
    <div class="e404-links">
      <a href="/" class="e404-link primary">Go Home</a>
      <a href="/en/catalog/" class="e404-link secondary">View Catalog</a>
      <a href="/en/blog/" class="e404-link secondary">Read Blog</a>
    </div>
  </div>
</body>
</html>
