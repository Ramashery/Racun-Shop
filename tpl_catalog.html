<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <title>RAKUN — Product Catalog</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body>
  <!-- NAV ... -->
  
  <div class="catalog-body">
    <aside class="catalog-sidebar" id="catalog-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Category</div>
        <div class="filter-cat-list" id="cat-list">
          <button class="filter-cat-btn active" data-cat="all" onclick="filterCat('all', this)">
            <span class="filter-cat-label">All Products</span>
          </button>
          {% for cat in categories %}
          <button class="filter-cat-btn" data-cat="{{ cat.slug }}" onclick="filterCat('{{ cat.slug }}', this)">
            <span class="filter-cat-label">{{ cat.label }}</span>
          </button>
          {% endfor %}
        </div>
      </div>
      <!-- Checkbox filters... (Оставьте ваши статические чекбоксы или генерируйте их из фич) -->
    </aside>

    <main class="catalog-main">
      <div class="catalog-toolbar">
        <span class="catalog-results-count" id="results-count"><strong>{{ products|length }}</strong> products found</span>
      </div>

      <div class="products-grid" id="products-grid">
        {% for p in products %}
        <!-- Важно: передаем data-cat, data-price, data-name для JS-фильтрации -->
        <a href="/{{ lang }}/products/{{ p._cat_slug }}/{{ p._slug }}/" 
           class="card-room-new" 
           data-cat="{{ p._cat_slug }}" 
           data-price="{{ p.price }}" 
           data-name="{{ p.name }}"
           data-tags="{{ p.features | join(' ') }}">
          <div class="card-img-wrap">
            {% if p.badge %}<span class="card-badge">{{ p.badge }}</span>{% endif %}
            <img alt="{{ p.name }}" src="{{ p.firstImage or 'https://via.placeholder.com/300x400' }}"/>
          </div>
          <div class="card-body">
            <span class="card-category">{{ p.categoryLabel }}</span>
            <h3 class="card-title">{{ p.name }}</h3>
            <p class="card-desc">{{ p.shortDescription }}</p>
          </div>
          <div class="card-footer"><span class="card-price">{{ p.priceRaw }}</span><span class="card-link">Details</span></div>
        </a>
        {% endfor %}
      </div>
    </main>
  </div>
  
  <script>
    // Здесь остается ВАШ JS-код из catalog.html для фильтрации (applyFilters, filterCat, setView и т.д.)
    // Код не меняется, так как он работает с DOM элементами.
  </script>
</body>
</html>
