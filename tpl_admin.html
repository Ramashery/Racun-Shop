<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RAKUN Admin Panel (Static)</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="/admin.css">
</head>
<body>
<!-- ВАШ HTML-КОД АДМИНКИ -->
<!-- Оставляю структуру без изменений (только сократил для экономии места, вставьте ВЕСЬ ваш HTML админки сюда до тега <script>) -->
<div class="sov" id="sov" onclick="closeMob()"></div>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sbl"><div class="lmark">RK</div><div class="ltxt">RAKUN<small>Admin Panel</small></div></div>
    <nav class="snav">
      <!-- ... -->
    </nav>
  </aside>
  <!-- MAIN -->
  <div class="main">
     <!-- Сюда вставляется ваш HTML админ-панели (со всеми модалками и таблицами) -->
     <!-- Подразумевается, что вы просто скопируете всё тело из admin.html -->
     <div class="topbar">
        <span class="tt" id="tptitle">Overview</span>
        <div class="tr"><span style="font-size:12px;color:var(--text2)">Generated at: {{ generated_at }}</span></div>
     </div>
     <div class="ct">
        <!-- Контейнеры таблиц -->
        <div id="cattbody"></div>
        <div id="products-tbody"></div>
        <div id="blog-tbody"></div>
     </div>
  </div>
</div>

<script>
  // 1. ИНЪЕКЦИЯ БАЗЫ ДАННЫХ ОТ PYTHON
  // Python передаст сюда весь JSON с продуктами, постами и категориями
  window.SITE_DATA = {{ site_data_json | safe }};
  
  console.log("Database successfully loaded statically:", window.SITE_DATA);

  // 2. Инициализация данных для UI
  // Подключаем ваши UI-переменные к данным из JSON
  const LANGS=['en','ru','ka','hy'];
  
  // Парсим категории из JSON для отображения в вашей админке
  let cats = (window.SITE_DATA.categories || []).map(c => {
      // Пытаемся вытащить английское имя или глобальное
      let engName = c.translations?.en?.name || c.en?.name || c.id;
      return {
          id: c._id,
          name: engName,
          slug: c.globalFields?.slug || c._id,
          color: c.globalFields?.color || '#4f7dff',
          status: c.globalFields?.status || 'Active',
          count: window.SITE_DATA.products.filter(p => p.globalFields?.categoryId === c._id).length
      };
  });

  // Все ваши существующие функции из admin.html (swBlogLang, renderCats и т.д.)
  // вставляются сюда.

  function renderCats(){
    const tb = document.getElementById('cattbody');
    if(tb){
      tb.innerHTML = cats.map(c => `<tr>
        <td><strong>${c.name}</strong></td>
        <td>${c.slug}</td>
        <td>${c.count}</td>
        <td>${c.status}</td>
        <td>/en/products/${c.slug}/</td>
      </tr>`).join('');
    }
  }

  // Запуск рендера при загрузке
  renderCats();

  /* 
   * ВАЖНО: 
   * Поскольку сайт теперь статический (SSG), кнопка "Publish" или "Save" 
   * в этой админке больше не может просто записать данные в Firebase напрямую 
   * из браузера.
   * 
   * Вам нужно написать JS-функцию `saveData()`, которая будет отправлять 
   * собранный JSON на ваш бэкенд (например, Cloud Function или серверный 
   * Python-скрипт), который запишет данные в Firestore и ЗАНОВО запустит 
   * скрипт `generate_site.py` для пересборки сайта.
   */
</script>
</body>
</html>
